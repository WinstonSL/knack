<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Knack logo">
  <defs>
    <linearGradient id="knack-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="60%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>
  <!-- 圆角方块代表 HTML 容器 -->
  <rect x="6" y="10" width="44" height="44" rx="11" ry="11" fill="url(#knack-grad)"/>
  <!-- 内嵌选区缺口（点选语义） -->
  <rect x="14" y="18" width="20" height="14" rx="3" ry="3" fill="#fff" opacity="0.92"/>
  <rect x="14" y="36" width="12" height="4" rx="2" ry="2" fill="#fff" opacity="0.7"/>
  <rect x="14" y="42" width="16" height="4" rx="2" ry="2" fill="#fff" opacity="0.55"/>
  <!-- 魔法笔（修改隐喻） -->
  <g transform="translate(36 6) rotate(38)">
    <rect x="0" y="0" width="6" height="22" rx="2" ry="2" fill="#1F1B2D"/>
    <rect x="0" y="22" width="6" height="6" fill="#FFD66B"/>
    <polygon points="0,28 6,28 3,34" fill="#1F1B2D"/>
  </g>
  <!-- 闪光点 -->
  <circle cx="50" cy="14" r="2" fill="#FFD66B"/>
  <circle cx="56" cy="22" r="1.4" fill="#FFD66B" opacity="0.85"/>
  <circle cx="46" cy="6" r="1.2" fill="#FFD66B" opacity="0.7"/>
</svg>
